name: Cypress Tests

on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Dependencies
        uses: cypress-io/github-action@v7.3.0
        with:
          runTests: false
      - name: Run Tests
        uses: cypress-io/github-action@v7.3.0
        with:
          install: false
